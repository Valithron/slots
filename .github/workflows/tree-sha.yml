name: Tree SHA

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/choose-your-ally

permissions:
  contents: read

jobs:
  tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record tree SHA
        run: git rev-parse 'HEAD^{tree}' > tree-sha.txt
      - name: Upload tree SHA
        uses: actions/upload-artifact@v4
        with:
          name: tree-sha
          path: tree-sha.txt
          retention-days: 1
