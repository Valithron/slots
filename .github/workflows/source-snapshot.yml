name: Source Snapshot

on:
  push:
    branches:
      - feature/choose-your-ally
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
