name: Export Branch Source

on:
  push:
    branches:
      - feature/reaction-reliability-scatter-balance
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload branch source
        uses: actions/upload-artifact@v4
        with:
          name: branch-source
          path: |
            .github
            assets
            css
            docs
            js
            tools
            index.html
            package.json
            README.md
          if-no-files-found: error
