name: Bootstrap Ally Mystery Extension

on:
  push:
    branches:
      - feature/ally-mystery-extensions-mobile-hud
    paths:
      - tools/bootstrap-ally-mystery-extension.mjs
      - .github/workflows/bootstrap-ally-mystery-extension.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply implementation
        run: node tools/bootstrap-ally-mystery-extension.mjs

      - name: Diff hygiene
        run: git diff --check

      - name: Install package metadata
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Automated tests
        run: npm test

      - name: Exact simulator
        run: npm run simulate

      - name: Exact simulator JSON
        run: npm run simulate:json > /tmp/simulate.json

      - name: Existing Monte Carlo
        run: npm run simulate:monte-carlo

      - name: Ally Mystery audit, 50k
        run: node tools/simulate-mystery-scatter.mjs --cycles=50000 --ally-cycles=50000 --seed=1297634388 | tee /tmp/ally-mystery-50k.txt

      - name: Ally Mystery audit, 500k/100k JSON
        run: node tools/simulate-mystery-scatter.mjs --cycles=500000 --ally-cycles=100000 --seed=1297634388 --json > /tmp/ally-mystery-500k.json

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep mystery spins inside ally features"
          git push origin HEAD:feature/ally-mystery-extensions-mobile-hud

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: ally-mystery-extension-bootstrap-reports
          path: |
            /tmp/simulate.json
            /tmp/ally-mystery-50k.txt
            /tmp/ally-mystery-500k.json
