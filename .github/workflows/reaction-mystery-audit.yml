name: Reaction and Mystery Audit

on:
  push:
    branches:
      - feature/reaction-reliability-scatter-balance
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run complete test suite
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee npm-test.txt

      - name: Run exact production simulator
        shell: bash
        run: |
          set -o pipefail
          npm run simulate 2>&1 | tee simulate.txt

      - name: Save exact simulator JSON
        run: npm run simulate:json > simulate.json

      - name: Run Ally Monte Carlo verification
        shell: bash
        run: |
          set -o pipefail
          npm run simulate:monte-carlo 2>&1 | tee simulate-monte-carlo.txt

      - name: Run 50,000-cycle Mystery audit
        shell: bash
        run: |
          set -o pipefail
          node tools/simulate-mystery-scatter.mjs --cycles=50000 --ally-cycles=50000 --seed=1297634388 2>&1 | tee mystery-50000.txt

      - name: Save 500,000-cycle Mystery audit JSON
        run: node tools/simulate-mystery-scatter.mjs --cycles=500000 --ally-cycles=500000 --seed=1297634388 --json > mystery-500000.json

      - name: Upload simulation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reaction-mystery-audit-reports
          path: |
            npm-test.txt
            simulate.txt
            simulate.json
            simulate-monte-carlo.txt
            mystery-50000.txt
            mystery-500000.json
          if-no-files-found: warn
