name: Patch Ally Mystery Regression

on:
  push:
    branches:
      - feature/ally-mystery-extensions-mobile-hud
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'feature/ally-mystery-extensions-mobile-hud'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ally-mystery-extensions-mobile-hud
          fetch-depth: 0

      - name: Update legacy Mystery expectations
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/mystery-tests.mjs')
          text = path.read_text()
          old = '''  assert.equal(tokenDone.mysterySettlement.freeSpinsAwarded, 1);
  assert.equal(spinState.mystery.queuedFreeSpins, 1, "Mystery tickets earned in Ally Free Spins wait outside the feature");
  assert.equal(spinState.mystery.modifierQueue[0].id, "spotlight");
  assert.equal(spinState.freeSpinSession.presentationSpin.mysterySettlement.applied, true);'''
          new = '''  assert.equal(tokenDone.mysterySettlement.freeSpinsAwarded, 1);
  assert.equal(tokenDone.mysterySettlement.allySpinsAdded, 1);
  assert.equal(tokenDone.mysterySettlement.ordinaryFreeSpinsAwarded, 0);
  assert.equal(spinState.mystery.queuedFreeSpins, 0, "Mystery awards earned in Ally Free Spins extend the active feature");
  assert.equal(spinState.freeSpinSession.remainingSpins, 4);
  assert.equal(spinState.freeSpinSession.totalAwardedSpins, 5);
  assert.equal(spinState.mystery.modifierQueue[0].id, "spotlight");
  assert.equal(spinState.freeSpinSession.presentationSpin.mysterySettlement.applied, true);
  assert.equal(spinState.freeSpinSession.presentationSpin.mysteryAward.allyExtension.applied, true);'''
          if old not in text:
              raise SystemExit('Legacy Ally Mystery expectation block was not found.')
          text = text.replace(old, new, 1)
          text = text.replace(
              '  assert.equal(spinState.mystery.queuedFreeSpins, 1, "Ally spins do not consume paused Mystery tickets");',
              '  assert.equal(spinState.mystery.queuedFreeSpins, 0, "Ally extension spins do not create or consume ordinary Mystery tickets");',
              1,
          )
          path.write_text(text)
          Path('.github/workflows/patch-ally-mystery-test.yml').unlink()
          PY

      - name: Commit regression update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/mystery-tests.mjs .github/workflows/patch-ally-mystery-test.yml
          git commit -m "Update Mystery tests for Ally extensions"
          git push origin HEAD:feature/ally-mystery-extensions-mobile-hud
