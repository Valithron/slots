name: Ally Mystery Extension Validation

on:
  push:
    branches:
      - feature/ally-mystery-extensions-mobile-hud
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ally-mystery-extensions-mobile-hud
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update persisted Rescue expectation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/mystery-tests.mjs')
          text = path.read_text()
          old = '  assert.equal(recovered.pendingSpin.mysteryRescue.selected, "replacement");'
          new = '''  assert.equal(recovered.pendingSpin.mysteryRescue.selected, "original");
            assert.equal(recovered.pendingSpin.mysteryRescue.attemptsUsed, 0);
            assert.equal(recovered.pendingSpin.mysteryTokenCount, 2);'''
          if old in text:
              text = text.replace(old, new, 1)
          settlement_old = '''  assert.equal(recovered.coins, before + done.totalWin);
            const settledCoins = recovered.coins;'''
          settlement_new = '''  assert.equal(recovered.coins, before + done.totalWin);
            assert.equal(done.totalWin, 0);
            assert.equal(done.mysteryTokenCount, 2);
            assert.equal(done.mysterySettlement.fortunePoints, CONFIG.mystery.rewards.twoTokenFortune);
            assert.equal(recovered.mystery.modifierQueue.length, 1);
            const settledCoins = recovered.coins;'''
          if settlement_old in text:
              text = text.replace(settlement_old, settlement_new, 1)
          path.write_text(text)
          PY

      - name: Publish persistence test update
        run: |
          if git diff --quiet; then
            echo "Persistence expectation already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/mystery-tests.mjs
          git commit -m "Update Rescue persistence test"
          git fetch origin feature/ally-mystery-extensions-mobile-hud
          git rebase origin/feature/ally-mystery-extensions-mobile-hud
          git push origin HEAD:feature/ally-mystery-extensions-mobile-hud

      - name: Diff hygiene
        run: git diff --check origin/main...HEAD

      - name: Focused Rescue and Ally tests
        run: node tools/mystery-tests.mjs && node tools/ally-mystery-extension-tests.mjs

      - name: Automated tests
        run: npm test

      - name: Exact simulator
        run: npm run simulate

      - name: Exact simulator JSON
        run: npm run simulate:json > simulate.json

      - name: Existing Monte Carlo
        run: npm run simulate:monte-carlo

      - name: Ally Mystery audit, 50k
        run: node tools/simulate-mystery-scatter.mjs --cycles=50000 --ally-cycles=50000 --seed=1297634388 | tee ally-mystery-50k.txt

      - name: Ally Mystery audit, 500k/100k JSON
        run: node tools/simulate-mystery-scatter.mjs --cycles=500000 --ally-cycles=100000 --seed=1297634388 --json > ally-mystery-500k.json

      - name: Upload simulation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ally-mystery-extension-reports
          path: |
            simulate.json
            ally-mystery-50k.txt
            ally-mystery-500k.json
          if-no-files-found: ignore
