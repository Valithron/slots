name: Ally Mystery Extension Validation

on:
  push:
    branches:
      - feature/ally-mystery-extensions-mobile-hud
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ally-mystery-extensions-mobile-hud
          fetch-depth: 0

      - name: Update stale Ally Mystery regression once
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/mystery-tests.mjs')
          text = path.read_text()
          old = '''  assert.equal(tokenDone.mysterySettlement.freeSpinsAwarded, 1);
  assert.equal(spinState.mystery.queuedFreeSpins, 1, "Mystery tickets earned in Ally Free Spins wait outside the feature");
  assert.equal(spinState.mystery.modifierQueue[0].id, "spotlight");
  assert.equal(spinState.freeSpinSession.presentationSpin.mysterySettlement.applied, true);'''
          new = '''  assert.equal(tokenDone.mysterySettlement.freeSpinsAwarded, 1);
  assert.equal(tokenDone.mysterySettlement.allySpinsAdded, 1);
  assert.equal(tokenDone.mysterySettlement.ordinaryFreeSpinsAwarded, 0);
  assert.equal(spinState.mystery.queuedFreeSpins, 0, "Mystery awards earned in Ally Free Spins extend the active feature");
  assert.equal(spinState.freeSpinSession.remainingSpins, 4);
  assert.equal(spinState.freeSpinSession.totalAwardedSpins, 5);
  assert.equal(spinState.mystery.modifierQueue[0].id, "spotlight");
  assert.equal(spinState.freeSpinSession.presentationSpin.mysterySettlement.applied, true);
  assert.equal(spinState.freeSpinSession.presentationSpin.mysteryAward.allyExtension.applied, true);'''
          if old in text:
              text = text.replace(old, new, 1)
              text = text.replace(
                  '  assert.equal(spinState.mystery.queuedFreeSpins, 1, "Ally spins do not consume paused Mystery tickets");',
                  '  assert.equal(spinState.mystery.queuedFreeSpins, 0, "Ally extension spins do not create or consume ordinary Mystery tickets");',
                  1,
              )
              path.write_text(text)
          temporary = Path('.github/workflows/patch-ally-mystery-test.yml')
          if temporary.exists():
              temporary.unlink()
          PY
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update Mystery tests for Ally extensions"
            git push origin HEAD:feature/ally-mystery-extensions-mobile-hud
          fi

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Diff hygiene
        run: git diff --check origin/main...HEAD

      - name: Automated tests
        run: npm test

      - name: Exact simulator
        run: npm run simulate

      - name: Exact simulator JSON
        run: npm run simulate:json > simulate.json

      - name: Existing Monte Carlo
        run: npm run simulate:monte-carlo

      - name: Ally Mystery audit, 50k
        run: node tools/simulate-mystery-scatter.mjs --cycles=50000 --ally-cycles=50000 --seed=1297634388 | tee ally-mystery-50k.txt

      - name: Ally Mystery audit, 500k/100k JSON
        run: node tools/simulate-mystery-scatter.mjs --cycles=500000 --ally-cycles=100000 --seed=1297634388 --json > ally-mystery-500k.json

      - name: Upload simulation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ally-mystery-extension-reports
          path: |
            simulate.json
            ally-mystery-50k.txt
            ally-mystery-500k.json
          if-no-files-found: ignore
